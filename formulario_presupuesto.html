<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Presupuesto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
        }
        
        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        
        .section {
            margin-bottom: 24px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="number"],
        textarea {
            width: 100%;
            font-size: 14px;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="tel"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            height: 80px;
        }
        
        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
            font-size: 13px;
        }
        
        input[type="checkbox"],
        input[type="radio"] {
            margin-right: 8px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .checkbox-label,
        .radio-label {
            flex: 1;
            color: #1f2937;
            cursor: pointer;
        }
        
        .price {
            font-size: 12px;
            color: #6b7280;
            margin-left: auto;
        }
        
        .total-section {
            padding-top: 12px;
            border-top: 1px solid #d1d5db;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-label {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }
        
        .total-amount {
            font-size: 28px;
            font-weight: 600;
            color: #667eea;
        }
        
        .form-section {
            margin-top: 24px;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .mensaje {
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        
        .mensaje.success {
            display: block;
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        
        .mensaje.error {
            display: block;
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solicitud de Presupuesto</h1>
        <p class="subtitle">Calcula y comparte tu cotización</p>
        
        <form id="cotizationForm">
            <!-- CALCULADORA -->
            <div class="section">
                <div class="section-title">Presupuesto</div>
                
                <div class="form-group">
                    <label>Superficie (m²) *</label>
                    <input type="number" id="area" min="0" step="0.1" value="100" required>
                </div>
                
                <!-- DISEÑO -->
                <div class="form-group">
                    <label style="font-weight: 600; font-size: 12px; text-transform: uppercase;">Diseño</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="bosquejo" checked>
                            <span class="checkbox-label">Bosquejo</span>
                            <span class="price">$18/m²</span>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="idea" checked>
                            <span class="checkbox-label">Idea de proyecto</span>
                            <span class="price">$22/m²</span>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="ejecutivo" checked>
                            <span class="checkbox-label">Proyecto ejecutivo</span>
                            <span class="price">$800</span>
                        </div>
                    </div>
                </div>
                
                <!-- CONSTRUCCIÓN -->
                <div class="form-group">
                    <label style="font-weight: 600; font-size: 12px; text-transform: uppercase;">Construcción Steel Frame</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="construccion" value="none" checked>
                            <span class="radio-label">Sin construcción</span>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="construccion" value="clasico">
                            <span class="radio-label">Steel frame clásico</span>
                            <span class="price">$1,250/m²</span>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="construccion" value="modena">
                            <span class="radio-label">Modena DVH (premium)</span>
                            <span class="price">$1,500/m²</span>
                        </div>
                    </div>
                </div>
                
                <div class="total-section">
                    <span class="total-label">Total presupuesto</span>
                    <span class="total-amount" id="total">$4,800</span>
                </div>
            </div>
            
            <!-- DATOS DE CONTACTO -->
            <div class="form-section">
                <div class="form-group">
                    <label>Nombre completo *</label>
                    <input type="text" id="nombre" required>
                </div>
                
                <div class="form-group">
                    <label>Teléfono/WhatsApp *</label>
                    <input type="tel" id="telefono" placeholder="+54 9 11 2345-6789" required>
                </div>
                
                <div class="form-group">
                    <label>Localidad/Provincia *</label>
                    <input type="text" id="localidad" placeholder="Buenos Aires" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="observaciones" placeholder="Comentarios adicionales..."></textarea>
                </div>
                
                <button type="submit">Enviar Cotización</button>
                <div class="mensaje" id="mensaje"></div>
            </div>
        </form>
    </div>
    
    <script>
        const PRICES = {
            bosquejo: 18,
            idea: 22,
            ejecutivo: 800,
            clasico: 1250,
            modena: 1500
        };
        
        const areaInput = document.getElementById('area');
        const bosquejoCheck = document.getElementById('bosquejo');
        const ideaCheck = document.getElementById('idea');
        const ejecutivoCheck = document.getElementById('ejecutivo');
        const construccionRadios = document.querySelectorAll('input[name="construccion"]');
        const totalElement = document.getElementById('total');
        const form = document.getElementById('cotizationForm');
        const mensajeDiv = document.getElementById('mensaje');
        
        function formatCurrency(value) {
            return '$' + Math.round(value * 100) / 100;
        }
        
        function updateCalculation() {
            const area = parseFloat(areaInput.value) || 0;
            let total = 0;
            
            if (bosquejoCheck.checked) total += area * PRICES.bosquejo;
            if (ideaCheck.checked) total += area * PRICES.idea;
            if (ejecutivoCheck.checked) total += PRICES.ejecutivo;
            
            const selectedConstruccion = document.querySelector('input[name="construccion"]:checked').value;
            if (selectedConstruccion === 'clasico') total += area * PRICES.clasico;
            else if (selectedConstruccion === 'modena') total += area * PRICES.modena;
            
            totalElement.textContent = formatCurrency(total);
        }
        
        function getDetalles() {
            const area = parseFloat(areaInput.value) || 0;
            let servicios = [];
            
            if (bosquejoCheck.checked) servicios.push(`Bosquejo: $${(area * PRICES.bosquejo).toFixed(2)}`);
            if (ideaCheck.checked) servicios.push(`Idea proyecto: $${(area * PRICES.idea).toFixed(2)}`);
            if (ejecutivoCheck.checked) servicios.push(`Proyecto ejecutivo: $${PRICES.ejecutivo}`);
            
            const selectedConstruccion = document.querySelector('input[name="construccion"]:checked').value;
            if (selectedConstruccion === 'clasico') servicios.push(`Steel frame clásico: $${(area * PRICES.clasico).toFixed(2)}`);
            else if (selectedConstruccion === 'modena') servicios.push(`Modena DVH: $${(area * PRICES.modena).toFixed(2)}`);
            
            return servicios.join('\n');
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const localidad = document.getElementById('localidad').value;
            const email = document.getElementById('email').value;
            const observaciones = document.getElementById('observaciones').value;
            const total = totalElement.textContent;
            const detalles = getDetalles();
            const fecha = new Date().toLocaleDateString('es-AR');
            
            const datos = {
                timestamp: new Date().toISOString(),
                fecha,
                nombre,
                telefono,
                localidad,
                email,
                area: areaInput.value,
                servicios: detalles,
                total,
                observaciones
            };
            
            console.log('Datos del formulario:', datos);
            
            // Aquí irá la integración con Google Sheets y WhatsApp
            mensajeDiv.textContent = '✓ Presupuesto registrado. Pronto te contactaremos.';
            mensajeDiv.className = 'mensaje success';
            
            form.reset();
            updateCalculation();
            
            setTimeout(() => {
                mensajeDiv.className = 'mensaje';
            }, 4000);
        });
        
        areaInput.addEventListener('input', updateCalculation);
        bosquejoCheck.addEventListener('change', updateCalculation);
        ideaCheck.addEventListener('change', updateCalculation);
        ejecutivoCheck.addEventListener('change', updateCalculation);
        construccionRadios.forEach(radio => radio.addEventListener('change', updateCalculation));
        
        updateCalculation();
    </script>
</body>
</html>
